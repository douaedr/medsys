spring:
  datasource:
    url: jdbc:h2:mem:ms_auth_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  # Email désactivé pour la démo (pas de SMTP requis)
  mail:
    host: localhost
    port: 25
    username: demo
    password: demo
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
